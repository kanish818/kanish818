  <text x="48" y="64" fill="#94A3B8" font-size="13" font-family="'Segoe UI', sans-serif">Based on primary language across featured public repositories</text>

  <text x="48" y="108" fill="#F8FAFC" font-size="15" font-family="'Segoe UI', sans-serif">Python</text>
  <rect x="160" y="94" width="480" height="18" rx="9" fill="#1E293B" />
  <rect x="160" y="94" width="300" height="18" rx="9" fill="#3776AB" />
