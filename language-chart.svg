  <text x="48" y="204" fill="#F8FAFC" font-size="15" font-family="'Segoe UI', sans-serif">Jupyter Notebook</text>
  <rect x="160" y="190" width="480" height="18" rx="9" fill="#1E293B" />
  <rect x="160" y="190" width="60" height="18" rx="9" fill="#F37626" />
